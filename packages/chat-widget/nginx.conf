# Static hosting for the widget bundles. Loaded cross-origin from
# customer sites, so CORS is wide open — the bundles are public assets
# and carry no secrets. Cache is short because the filenames are not
# content-hashed; embedders always get a fresh loader within 5 minutes.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    gzip on;
    gzip_types application/javascript;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
