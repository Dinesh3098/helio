name: Feature request
description: Suggest an improvement or new capability for Helio
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who hits it and when?
      placeholder: As an agent handling many conversations, I can't…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Rough ideas are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - API (NestJS)
        - Dashboard (Next.js)
        - Chat widget
        - Realtime / Socket.IO
        - AI features
        - Email
        - Knowledge base
        - Automation
        - File uploads / storage
        - Auth / workspaces
        - Docker / deployment
        - Other
    validations:
      required: true
