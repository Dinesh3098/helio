# Weekly dependency updates, grouped by ecosystem to keep PR volume low.
# Patch releases are ignored (patch spam); security advisories still
# arrive immediately regardless of these rules via Dependabot alerts.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      nestjs:
        patterns: ["@nestjs/*", "nestjs-*"]
      aws-sdk:
        patterns: ["@aws-sdk/*"]
      react-next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "prettier"
          - "typescript"
          - "turbo"
          - "tsx"
          - "vite"
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "postcss"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/apps/api"
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: docker
    directory: "/apps/web"
    schedule:
      interval: weekly
      day: monday
